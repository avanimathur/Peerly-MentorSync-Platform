<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete Profile</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page">
  <div class="container">
    <h2>Profile</h2>
    <p class="subtitle">Tell others more about yourself</p>
    <div id="status" class="status info" style="display:none;"></div>

    <form id="profileForm">
      <input id="department" placeholder="Department" required>
      <input id="year" placeholder="Year (e.g. 2nd Year)">
      <input id="skills" placeholder="Skills (comma separated)">
      <input id="interests" placeholder="Interests (comma separated)">
      <textarea id="bio" placeholder="Short bio"></textarea>

      <button type="submit" id="saveButton">Save</button>
    </form>
  </div>
</div>
<script src="js/config.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
