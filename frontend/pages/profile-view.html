<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentor Profile – Peerly</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/main.css">
<style>
.profile-hero { background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 100%); border-radius: var(--radius-lg); padding: 36px; color: white; margin-bottom: 24px; }
.profile-hero-inner { display: flex; align-items: flex-start; gap: 24px; flex-wrap: wrap; }
.hero-name { font-size: 26px; font-weight: 700; }
.hero-meta { font-size: 15px; opacity: 0.85; margin-top: 4px; }
.hero-stats { display: flex; gap: 24px; margin-top: 16px; }
.hero-stat-val { font-size: 22px; font-weight: 700; }
.hero-stat-label { font-size: 12px; opacity: 0.75; }
.hero-actions { margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap; }
.review-card { padding: 16px; border: 1px solid var(--gray-200); border-radius: var(--radius); margin-bottom: 10px; }
.review-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.avail-chip { display: inline-flex; align-items: center; gap: 6px; background: var(--primary-light); color: var(--primary); padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: 500; margin: 3px; }
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="topbar" id="topbar"></div>
    <div class="page-content" style="max-width:800px" id="content">
      <div style="text-align:center;padding:60px;color:var(--gray-400)">Loading profile…</div>
    </div>
  </div>
</div>

<!-- Request modal -->
<div class="modal-overlay hidden" id="req-modal">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">Send Mentorship Request</span><button class="btn btn-ghost btn-icon" onclick="closeModal('req-modal')">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="req-to-id">
      <div class="form-group"><label class="form-label">Message</label><textarea id="req-msg" class="form-control" rows="3" placeholder="Introduce yourself…"></textarea></div>
      <div class="form-group"><label class="form-label">Your goals</label><textarea id="req-goals" class="form-control" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('req-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="sendRequest()">Send</button>
    </div>
  </div>
</div>

<script src="../js/utils.js"></script>
<script src="../js/page.js"></script>
<script>
initPage('mentors', 'Mentor Profile');
const me = getUser();
const params = new URLSearchParams(location.search);
const mentorId = params.get('id');

async function loadProfile() {
  if (!mentorId) { window.location.href = 'mentors.html'; return; }
  const content = document.getElementById('content');
  try {
    const { user, reviews } = await apiFetch(`/users/${mentorId}`);
    const avgRating = reviews.length ? (reviews.reduce((s, r) => s + r.rating, 0) / reviews.length).toFixed(1) : null;
    const isOwnProfile = user._id === me._id;
    // Mentees can request mentors. Mentors cannot request anyone.
    const canRequest = !isOwnProfile && me.role === 'mentee' && user.role === 'mentor';
    // Anyone can message anyone (not themselves)
    const canMessage = !isOwnProfile;
    const backLink = me.role === 'mentor' ? 'dashboard.html' : 'mentors.html';

    content.innerHTML = `
      <div style="margin-bottom:16px">
        <a href="${backLink}" class="btn btn-ghost btn-sm">← Back</a>
      </div>
      <div class="profile-hero">
        <div class="profile-hero-inner">
          <div class="avatar avatar-xl">${avatarHTML(user)}</div>
          <div style="flex:1">
            <div class="hero-name">${user.name} ${user.isVerified ? '<span style="font-size:14px;opacity:0.9">✓ Verified</span>' : ''}</div>
            <div class="hero-meta" style="text-transform:capitalize">${user.role}${user.department ? ' · ' + user.department : ''}${user.year ? ' · ' + user.year : ''}</div>
            ${avgRating ? `<div style="margin-top:8px;font-size:15px">${starsHTML(avgRating)} <span>${avgRating} (${reviews.length} review${reviews.length !== 1 ? 's' : ''})</span></div>` : ''}
            <div class="hero-stats">
              <div class="hero-stat"><div class="hero-stat-val">${user.totalSessions || 0}</div><div class="hero-stat-label">Sessions</div></div>
              <div class="hero-stat"><div class="hero-stat-val">${user.reputationScore || 0}</div><div class="hero-stat-label">Rep</div></div>
              ${user.role === 'mentor' ? `<div class="hero-stat"><div class="hero-stat-val">${user.menteeCount || 0}</div><div class="hero-stat-label">Mentees</div></div>` : ''}
            </div>
            <div class="hero-actions">
              ${canRequest ? `<button class="btn btn-primary" onclick="openReqModal('${user._id}')">Request mentorship</button>` : ''}
              ${canMessage ? `<a href="messages.html?with=${user._id}&name=${encodeURIComponent(user.name)}&avatar=${encodeURIComponent(user.avatar||'')}" class="btn btn-outline" style="color:white;border-color:rgba(255,255,255,0.5)">💬 Message</a>` : ''}
              ${!isOwnProfile ? `<button class="btn btn-ghost" style="color:white;opacity:0.75" onclick="reportUser('${user._id}')">🚩 Report</button>` : ''}
              ${isOwnProfile ? `<a href="profile.html" class="btn btn-outline" style="color:white;border-color:rgba(255,255,255,0.5)">✏️ Edit profile</a>` : ''}
            </div>
          </div>
        </div>
      </div>

      <div class="grid-2" style="gap:20px;align-items:start">
        <div>
          ${user.bio ? `<div class="card mb-4"><div class="card-header"><h3>About</h3></div><div class="card-body" style="font-size:14px;line-height:1.7;color:var(--gray-700)">${user.bio}</div></div>` : ''}

          ${user.skills?.length ? `
            <div class="card mb-4"><div class="card-header"><h3>Skills</h3></div>
            <div class="card-body">${user.skills.map(s => `<span class="tag tag-primary">${s}</span>`).join('')}</div></div>` : ''}

          ${user.interests?.length ? `
            <div class="card mb-4"><div class="card-header"><h3>Interests</h3></div>
            <div class="card-body">${user.interests.map(i => `<span class="tag">${i}</span>`).join('')}</div></div>` : ''}

          ${(user.linkedIn || user.github) ? `
            <div class="card"><div class="card-header"><h3>Links</h3></div><div class="card-body" style="display:flex;flex-direction:column;gap:8px">
              ${user.linkedIn ? `<a href="${user.linkedIn}" target="_blank" class="btn btn-outline btn-sm" style="width:fit-content">LinkedIn ↗</a>` : ''}
              ${user.github ? `<a href="${user.github}" target="_blank" class="btn btn-outline btn-sm" style="width:fit-content">GitHub ↗</a>` : ''}
            </div></div>` : ''}
        </div>

        <div>
          ${user.availability?.length ? `
            <div class="card mb-4"><div class="card-header"><h3>Availability</h3></div>
            <div class="card-body">${user.availability.map(a => `<span class="avail-chip">📅 ${a.day} ${a.startTime}–${a.endTime}</span>`).join('')}</div></div>` : ''}

          ${reviews.length ? `
            <div class="card"><div class="card-header"><h3>Reviews</h3></div>
            <div class="card-body">
              ${reviews.map(r => `
                <div class="review-card">
                  <div class="review-header">
                    <div class="avatar avatar-sm">${avatarHTML(r.mentee)}</div>
                    <div>
                      <div class="font-semibold" style="font-size:14px">${r.mentee?.name}</div>
                      <div>${starsHTML(r.rating)}</div>
                    </div>
                    <span class="text-xs text-muted" style="margin-left:auto">${timeAgo(r.createdAt)}</span>
                  </div>
                  ${r.comment ? `<div class="text-sm" style="color:var(--gray-600)">"${r.comment}"</div>` : ''}
                </div>`).join('')}
            </div></div>` : ''}
        </div>
      </div>`;
  } catch (err) {
    content.innerHTML = `<div class="empty-state"><div class="empty-title">Profile not found</div><a href="${me?.role === 'mentor' ? 'dashboard.html' : 'mentors.html'}" class="btn btn-primary btn-sm">← Go back</a></div>`;
  }
}

function openReqModal(id) {
  document.getElementById('req-to-id').value = id;
  openModal('req-modal');
}

async function sendRequest() {
  try {
    await apiFetch('/requests', {
      method: 'POST',
      body: JSON.stringify({
        to: document.getElementById('req-to-id').value,
        message: document.getElementById('req-msg').value,
        goals: document.getElementById('req-goals').value
      })
    });
    closeModal('req-modal');
    showToast('Request sent! 🎉', 'success');
  } catch (err) { showToast(err.message, 'error'); }
}

async function reportUser(id) {
  try {
    await apiFetch(`/users/report/${id}`, { method: 'POST' });
    showToast('Report submitted', 'info');
  } catch {}
}

loadProfile();
</script>
</body>
</html>
