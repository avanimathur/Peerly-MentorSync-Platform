<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – Peerly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<style>
body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #f0eeff 0%, #f9fafb 60%); }
.auth-wrap { width: 100%; max-width: 420px; padding: 16px; }
.auth-card { background: white; border-radius: 20px; padding: 40px 36px; box-shadow: 0 8px 40px rgba(108,99,255,0.13); }
.auth-logo { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 28px; }
.auth-logo .logo-icon { width: 44px; height: 44px; background: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 22px; }
.auth-logo .logo-text { font-size: 26px; font-weight: 800; color: var(--gray-900); }
h2 { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 6px; }
.subtitle { text-align: center; color: var(--gray-500); font-size: 14px; margin-bottom: 28px; }
.alt-link { text-align: center; margin-top: 20px; font-size: 14px; color: var(--gray-600); }
.alt-link a { color: var(--primary); font-weight: 600; }
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">P</div>
      <div class="logo-text">Peerly</div>
    </div>
    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to continue your mentoring journey</p>
    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" id="email" class="form-control" placeholder="you@university.edu" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
      </div>
      <div id="error-msg" class="form-error hidden"></div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:8px" id="login-btn">Sign in</button>
    </form>
    <div class="alt-link">Don't have an account? <a href="register.html">Sign up</a></div>
  </div>
</div>
<script src="js/utils.js"></script>
<script>
requireGuest();
document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('error-msg');
  btn.disabled = true; btn.textContent = 'Signing in…';
  errEl.classList.add('hidden');
  try {
    const data = await apiFetch('/auth/login', {
      method: 'POST',
      body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
    });
    setAuth(data.token, data.user);
    window.location.href = pagePath('dashboard.html');
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
    btn.disabled = false; btn.textContent = 'Sign in';
  }
});
</script>
</body>
</html>
