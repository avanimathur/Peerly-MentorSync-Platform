<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register – Peerly</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<style>
body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #f0eeff 0%, #f9fafb 60%); padding: 24px; }
.auth-wrap { width: 100%; max-width: 480px; }
.auth-card { background: white; border-radius: 20px; padding: 40px 36px; box-shadow: 0 8px 40px rgba(108,99,255,0.13); }
.auth-logo { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 28px; }
.auth-logo .logo-icon { width: 44px; height: 44px; background: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 22px; }
.auth-logo .logo-text { font-size: 26px; font-weight: 800; color: var(--gray-900); }
h2 { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 6px; }
.subtitle { text-align: center; color: var(--gray-500); font-size: 14px; margin-bottom: 28px; }
.role-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.role-card { border: 2px solid var(--gray-200); border-radius: 12px; padding: 14px; text-align: center; cursor: pointer; transition: all 0.18s; }
.role-card:hover { border-color: var(--primary); }
.role-card.selected { border-color: var(--primary); background: var(--primary-light); }
.role-icon { font-size: 24px; margin-bottom: 4px; }
.role-title { font-size: 14px; font-weight: 600; }
.role-desc { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
.alt-link { text-align: center; margin-top: 20px; font-size: 14px; color: var(--gray-600); }
.alt-link a { color: var(--primary); font-weight: 600; }
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">P</div>
      <div class="logo-text">Peerly</div>
    </div>
    <h2>Create your account</h2>
    <p class="subtitle">Join thousands of students growing together</p>
    <form id="reg-form">
      <div class="role-selector" id="role-selector">
        <div class="role-card selected" data-role="mentee">
          <div class="role-icon">🎓</div>
          <div class="role-title">Mentee</div>
          <div class="role-desc">I want to learn from experienced peers</div>
        </div>
        <div class="role-card" data-role="mentor">
          <div class="role-icon">🌟</div>
          <div class="role-title">Mentor</div>
          <div class="role-desc">I want to guide and support others</div>
        </div>
      </div>
      <input type="hidden" id="role" value="mentee">
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Full name</label>
          <input type="text" id="name" class="form-control" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Department</label>
          <input type="text" id="department" class="form-control" placeholder="e.g. Computer Science">
        </div>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input type="email" id="email" class="form-control" placeholder="you@university.edu" required>
        </div>
        <div class="form-group">
          <label class="form-label">Year</label>
          <select id="year" class="form-control">
            <option value="">Select year</option>
            <option>1st Year</option><option>2nd Year</option>
            <option>3rd Year</option><option>4th Year</option>
            <option>Masters</option><option>PhD</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="At least 6 characters" required minlength="6">
      </div>
      <div id="error-msg" class="form-error hidden"></div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:8px" id="reg-btn">Create account</button>
    </form>
    <div class="alt-link">Already have an account? <a href="login.html">Sign in</a></div>
  </div>
</div>
<script src="js/utils.js"></script>
<script>
requireGuest();
document.querySelectorAll('.role-card').forEach(card => {
  card.addEventListener('click', () => {
    document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    document.getElementById('role').value = card.dataset.role;
  });
});
document.getElementById('reg-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('reg-btn');
  const errEl = document.getElementById('error-msg');
  btn.disabled = true; btn.textContent = 'Creating account…';
  errEl.classList.add('hidden');
  try {
    const data = await apiFetch('/auth/register', {
      method: 'POST',
      body: JSON.stringify({
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        role: document.getElementById('role').value,
        department: document.getElementById('department').value,
        year: document.getElementById('year').value
      })
    });
    setAuth(data.token, data.user);
    window.location.href = pagePath('dashboard.html');
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
    btn.disabled = false; btn.textContent = 'Create account';
  }
});
</script>
</body>
</html>
